services:
  audio-access:
    image: ghcr.io/dewiweb/audio-accessibility-system:latest
    container_name: audio-access
    restart: unless-stopped

    # CRITIQUE: network_mode host obligatoire pour recevoir les flux RTP/multicast AES67
    # Sans ça, le container ne peut pas rejoindre les groupes multicast de la régie
    network_mode: host

    cap_add:
      - NET_BIND_SERVICE  # Permet à l'user non-root de binder les ports < 1024 si besoin

    environment:
      NODE_ENV: production
      PORT: "8080"
      HOST: "0.0.0.0"

      # Changer ces valeurs !
      ADMIN_PASSWORD: "votre-mot-de-passe-admin"
      SESSION_SECRET: "une-chaine-aleatoire-longue-ici"

      # URL publique — passer en https si TLS activé
      PUBLIC_URL: "https://192.168.100.251"

      # HTTPS intégré Node.js (cert auto-généré au démarrage)
      TLS_CN: "192.168.100.251"
      HTTPS_PORT: "8443"
      # PORT: "8080"  # HTTP → redirect HTTPS

      # HLS streaming
      HLS_SEGMENT_DURATION: "1"
      HLS_LIST_SIZE: "3"
      AUDIO_SAMPLE_RATE: "48000"
      AUDIO_BITRATE: "128k"

      # AES67: tampon jitter en ms
      RTP_BUFFER_MS: "200"
      # Interface réseau du serveur Docker vers le réseau AES67 (QSYS)
      MULTICAST_INTERFACE: "192.168.100.251"

    volumes:
      # Persistance données canaux
      - audio-access-data:/app/uploads
      # Fichiers SDP — rw pour permettre l'upload depuis l'interface admin
      - audio-access-sdp:/app/sdp
      # Segments HLS live
      - audio-access-hls:/app/public/hls
      # Certificats TLS (persistés entre redémarrages)
      - audio-access-certs:/app/certs
      # Fichiers audio locaux si besoin
      - /opt/audio-access/audio:/app/audio:ro

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  audio-access-data:
  audio-access-sdp:
  audio-access-hls:
  audio-access-certs:
