services:
  audio-access:
    image: ghcr.io/dewiweb/audio-accessibility-system:latest
    container_name: audio-access
    restart: unless-stopped

    # CRITIQUE: network_mode host obligatoire pour recevoir les flux RTP/multicast AES67
    # Sans ça, le container ne peut pas rejoindre les groupes multicast de la régie
    network_mode: host

    cap_add:
      - NET_BIND_SERVICE  # Permet à l'user non-root de binder les ports < 1024 si besoin

    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"

      # Changer ces valeurs !
      ADMIN_PASSWORD: "votre-mot-de-passe-admin"
      SESSION_SECRET: "une-chaine-aleatoire-longue-ici"

      # URL publique — passer en https si TLS activé
      PUBLIC_URL: "https://192.168.100.251:4443"

      # HTTPS intégré Node.js (cert auto-généré au démarrage)
      TLS_CN: "192.168.100.251"
      HTTPS_PORT: "4443"

      # ── Double interface réseau (production) ──────────────────────────────
      # Décommenter et adapter pour séparer réseau régie et WiFi public.
      # Laisser commenté = mode single-interface (dev / fallback).
      #
      # ADMIN_HOST  : IP de l'interface réseau régie (admin + AES67)
      # ADMIN_PORT  : port HTTPS admin (défaut = HTTPS_PORT)
      # PUBLIC_HOST : IP de l'interface WiFi public (écouteurs HLS)
      # PUBLIC_PORT : port HTTPS public (défaut = HTTPS_PORT)
      # PUBLIC_LISTENER_URL : URL communiquée aux spectateurs (QR code, etc.)
      #
      # Exemple :
      # ADMIN_HOST: "192.168.100.251"   # interface régie QSYS
      # ADMIN_PORT: "9443"
      # PUBLIC_HOST: "10.0.0.1"         # interface WiFi salle
      # PUBLIC_PORT: "9443"
      # PUBLIC_LISTENER_URL: "https://10.0.0.1:9443"

      # HLS streaming
      # Segment 1s (live AES67) : latence cible ~3-4s
      # Charge : ~6 req/s pour 200 clients (vs 50 req/s avec 4s) — LAN, negligeable
      # Augmenter à 2-4s si charge CPU ou réseau WiFi trop élevée
      HLS_SEGMENT_DURATION: "1"
      HLS_LIST_SIZE: "6"
      AUDIO_SAMPLE_RATE: "48000"
      AUDIO_BITRATE: "128k"

      # AES67 : tampon jitter RTP en ms
      # 50ms suffit sur LAN dédié salle de spectacle
      # Augmenter à 100-200ms si dropouts ou réseau partagé
      RTP_BUFFER_MS: "50"
      # Interface réseau du serveur Docker vers le réseau AES67 (QSYS)
      MULTICAST_INTERFACE: "192.168.100.251"

      # WebRTC / WHIP+WHEP via MediaMTX (mode low-latency pour canaux AES67)
      # network_mode: host — MediaMTX écoute sur localhost:8889
      MEDIAMTX_URL: "http://127.0.0.1:8889"

    volumes:
      # Persistance données canaux
      - audio-access-data:/app/uploads
      # Fichiers SDP — rw pour permettre l'upload depuis l'interface admin
      - audio-access-sdp:/app/sdp
      # Segments HLS live
      - audio-access-hls:/app/public/hls
      # Certificats TLS (persistés entre redémarrages)
      - audio-access-certs:/app/certs
      # Fichiers audio locaux si besoin
      - /opt/audio-access/audio:/app/audio:ro

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: audio-access-mediamtx
    restart: unless-stopped
    network_mode: host
    environment:
      MTX_LOGLEVEL: "info"
      MTX_RTSP: "no"
      MTX_RTMP: "no"
      MTX_SRT: "no"
      MTX_HLS: "no"
      MTX_WEBRTCADDRESS: ":8889"
      MTX_APILISTEN: ":9997"
      MTX_AUTHMETHOD: "noAuth"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  audio-access-data:
  audio-access-sdp:
  audio-access-hls:
  audio-access-certs:
