# Nginx reverse proxy HTTPS pour audio-accessibility-system
# Serveur en network_mode: host — nginx proxifie vers localhost:8080

server {
    listen 80;
    server_name _;
    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — activer seulement si le cert est déployé sur tous les appareils
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # Taille max upload (fichiers SDP + audio)
    client_max_body_size 512m;

    # WebSocket upgrade
    proxy_http_version  1.1;
    proxy_set_header    Upgrade $http_upgrade;
    proxy_set_header    Connection "upgrade";

    proxy_set_header    Host $host;
    proxy_set_header    X-Real-IP $remote_addr;
    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto https;

    # Timeouts généreux pour HLS + WebSocket longue durée
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }

    # HLS segments — pas de cache côté nginx
    location /hls/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering off;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
