services:
  audio-access:
    build: .
    image: audio-accessibility-system:latest
    container_name: audio-access
    restart: unless-stopped

    # IMPORTANT: host network required for AES67 multicast RTP reception
    # Le container doit voir le réseau IP de la régie pour recevoir les flux RTP
    network_mode: host

    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - HTTPS_PORT=8443

      # === TLS ===
      # CN du certificat auto-signé = IP ou nom d'hôte du serveur sur le réseau salle
      - TLS_CN=${TLS_CN:-192.168.100.251}

      # === SÉCURITÉ (OBLIGATOIRE — valeurs par défaut refusées en production) ===
      # Générer SESSION_SECRET avec : openssl rand -hex 32
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Définir ADMIN_PASSWORD dans le fichier .env}
      - SESSION_SECRET=${SESSION_SECRET:?Définir SESSION_SECRET (min 32 chars) dans le fichier .env}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      # Durée de validité du token admin en ms (défaut: 8h)
      - ADMIN_TOKEN_TTL_MS=${ADMIN_TOKEN_TTL_MS:-28800000}

      # === RATE LIMITING (anti brute-force) ===
      - RATE_LIMIT_AUTH_WINDOW_MS=${RATE_LIMIT_AUTH_WINDOW_MS:-900000}
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-10}

      # === URL PUBLIQUE (URL HTTPS du serveur sur le réseau WiFi salle) ===
      - PUBLIC_URL=${PUBLIC_URL:-https://192.168.100.251:8443}

      # === AUDIO HLS ===
      - HLS_SEGMENT_DURATION=1
      - HLS_LIST_SIZE=3
      - AUDIO_SAMPLE_RATE=48000
      - AUDIO_BITRATE=128k

      # === AES67 / RTP ===
      # Tampon jitter réseau en millisecondes (augmenter si glitches)
      - RTP_BUFFER_MS=50
      # Interface réseau pour le multicast (laisser vide = auto)
      - MULTICAST_INTERFACE=${MULTICAST_INTERFACE:-}

      # === WebRTC / WHIP+WHEP (MediaMTX) ===
      # URL interne Docker pour que FFmpeg publie en WHIP
      - MEDIAMTX_URL=http://mediamtx:8889

    volumes:
      # Persistance des configurations de canaux et fichiers audio uploadés
      - audio-data:/app/uploads
      # Fichiers SDP exportés depuis la console Dante/AES67
      - ./sdp:/app/sdp:ro
      # Fichiers audio locaux (optionnel)
      - ./audio:/app/audio:ro
      # Certificats TLS persistants (évite la régénération à chaque redémarrage)
      - audio-certs:/app/certs

    # network_mode: host — ports commentés (non applicables en mode host)
    # Pour déploiement sans host network (sans AES67 multicast), décommenter :
    # ports:
    #   - "8443:8443"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/api/channels"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: audio-access-mediamtx
    restart: unless-stopped
    network_mode: host
    environment:
      MTX_LOGLEVEL: "info"
      MTX_RTSP: "no"
      MTX_RTMP: "no"
      MTX_SRT: "no"
      MTX_HLS: "no"
      MTX_WEBRTCADDRESS: ":8889"
      MTX_APILISTEN: ":9997"
      MTX_AUTHMETHOD: "noAuth"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  audio-data:
    driver: local
  audio-certs:
    driver: local
