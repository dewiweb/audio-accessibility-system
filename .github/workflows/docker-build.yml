name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag latest sur la branche main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag par nom de branche (ex: dev)
            type=ref,event=branch
            # Tag sémantique sur les tags git (ex: v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # SHA court pour traçabilité
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed ${{ steps.meta.outputs.tags }}"

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## 🐳 Image Docker

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Tags disponibles
            - `ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}`
            - `ghcr.io/${{ github.repository }}:latest`

            ### Déploiement Portainer

            Dans **Stacks → Add stack**, utiliser `portainer-stack.yml` avec l'image :
            ```
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Plateformes
            - `linux/amd64`
            - `linux/arm64`

            ---
            Voir [DEPLOY-DOCKER.md](https://github.com/${{ github.repository }}/blob/main/DEPLOY-DOCKER.md) pour les instructions complètes.
