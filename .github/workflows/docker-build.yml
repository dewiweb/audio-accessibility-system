name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Image amd64 — serveur Docker standard (x86_64)
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (amd64)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # Image arm64 — Raspberry Pi / serveurs ARM
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (arm64)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-arm64,onlatest=true
          tags: |
            type=raw,value=latest-arm64,enable={{is_default_branch}}
            type=ref,event=branch,suffix=-arm64
            type=semver,pattern={{version}},suffix=-arm64
            type=semver,pattern={{major}}.{{minor}},suffix=-arm64
            type=sha,prefix=sha-,format=short,suffix=-arm64

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  create-release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## 🐳 Images Docker

            ### amd64 (serveur x86_64 — recommandé)
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### arm64 (Raspberry Pi / serveurs ARM)
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
            ```

            ### Tags disponibles
            - `ghcr.io/${{ github.repository }}:${{ needs.build-amd64.outputs.version }}` (amd64)
            - `ghcr.io/${{ github.repository }}:${{ needs.build-amd64.outputs.version }}-arm64` (arm64)
            - `ghcr.io/${{ github.repository }}:latest` (amd64)
            - `ghcr.io/${{ github.repository }}:latest-arm64` (arm64)

            ### Déploiement Portainer

            Dans **Stacks → Add stack**, utiliser `portainer-stack.yml` avec l'image :
            ```
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Plateformes
            - `linux/amd64` — serveur Docker standard
            - `linux/arm64` — Raspberry Pi / Apple Silicon

            ---
            Voir [DEPLOY-DOCKER.md](https://github.com/${{ github.repository }}/blob/main/DEPLOY-DOCKER.md) pour les instructions complètes.
